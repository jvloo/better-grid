version: 2

updates:
  # Root + workspace pnpm dependencies.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      # Lump non-major bumps together to keep the noise down.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        # Excluded: react/react-dom (we coordinate those manually with the React adapter).
        exclude-patterns:
          - "react"
          - "react-dom"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflow versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
